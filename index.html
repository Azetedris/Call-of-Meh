<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini FPS Shooter - WASD + Botlar</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#crosshair {
  position:absolute; left:50%; top:50%;
  width:10px; height:10px;
  margin-left:-5px; margin-top:-5px;
  border:2px solid yellow; border-radius:50%;
  pointer-events:none;
}
#mapSelect {
  position:absolute; top:10px; left:10px; z-index:10; padding:5px;
  background:#333; color:#fff;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
<div id="crosshair"></div>
<select id="mapSelect">
  <option value="dust2">Dust2</option>
  <option value="cs_office">CS Office</option>
</select>

<script>
// ===========================
// SCENE SETUP
// ===========================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);
scene.fog = new THREE.FogExp2(0x222222,0.02);

const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===========================
// LIGHTING
// ===========================
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// ===========================
// GROUND
// ===========================
const groundGeo = new THREE.PlaneGeometry(100,100);
const groundMat = new THREE.MeshPhongMaterial({color:0x555555});
const ground = new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===========================
// DUST PARTICLES
// ===========================
const dustGeo = new THREE.BufferGeometry();
const dustCount = 2000;
const positions = new Float32Array(dustCount*3);
for(let i=0;i<dustCount*3;i++) positions[i] = Math.random()*50-25;
dustGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));
const dustMat = new THREE.PointsMaterial({color:0x888888,size:0.1});
const dustParticles = new THREE.Points(dustGeo,dustMat);
scene.add(dustParticles);

// ===========================
// CONTROLS
// ===========================
const controls = new THREE.PointerLockControls(camera,document.body);
document.body.addEventListener('click',()=>controls.lock());
scene.add(controls.getObject());

// ===========================
// PLAYER MOVEMENT
// ===========================
const keys = {};
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
const playerSpeed = 0.2;

// ===========================
// BULLETS
// ===========================
const bullets = [];
document.addEventListener('click',shootBullet);
function shootBullet(){
  const geo = new THREE.SphereGeometry(0.1,8,8);
  const mat = new THREE.MeshBasicMaterial({color:0xffff00});
  const bullet = new THREE.Mesh(geo,mat);
  bullet.position.copy(camera.position);
  bullet.direction = new THREE.Vector3();
  camera.getWorldDirection(bullet.direction);
  bullet.speed = 1;
  scene.add(bullet);
  bullets.push(bullet);
}

// ===========================
// ENEMIES (BOTLAR)
// ===========================
const enemies = [];
function spawnBot(x,z){
  const geo = new THREE.BoxGeometry(1,1,1);
  const mat = new THREE.MeshPhongMaterial({color:0xff0000});
  const bot = new THREE.Mesh(geo,mat);
  bot.position.set(x,0.5,z);
  scene.add(bot);
  enemies.push({mesh:bot});
}

// Başlanğıc botlar
spawnBot(5,-5);
spawnBot(-5,-10);

// Simple bot AI
function moveBots(){
  enemies.forEach(e=>{
    const dir = new THREE.Vector3();
    dir.subVectors(controls.getObject().position,e.mesh.position);
    if(dir.length()>0.1){
      dir.normalize();
      e.mesh.position.add(dir.multiplyScalar(0.01));
    }
  });
}

// ===========================
// MAP SYSTEM
// ===========================
function loadMap(name){
  // Mövcud botları sil
  enemies.forEach(e=>scene.remove(e.mesh));
  enemies.length=0;
  if(name==='dust2'){
    spawnBot(5,-5);
    spawnBot(-5,-10);
  } else if(name==='cs_office'){
    spawnBot(3,-3);
    spawnBot(-3,-6);
  }
}
document.getElementById('mapSelect').addEventListener('change',e=>{
  loadMap(e.target.value);
});

// ===========================
// ANIMATE LOOP
// ===========================
function animate(){
  requestAnimationFrame(animate);

  // Player movement
  if(keys['w']) controls.moveForward(playerSpeed);
  if(keys['s']) controls.moveForward(-playerSpeed);
  if(keys['a']) controls.moveRight(-playerSpeed);
  if(keys['d']) controls.moveRight(playerSpeed);

  // Bullets update
  bullets.forEach((b,i)=>{
    b.position.add(b.direction.clone().multiplyScalar(b.speed));
    enemies.forEach((e,j)=>{
      if(b.position.distanceTo(e.mesh.position)<0.7){
        scene.remove(e.mesh);
        enemies.splice(j,1);
        scene.remove(b);
        bullets.splice(i,1);
      }
    });
  });

  // Dust rotation
  dustParticles.rotation.y += 0.001;

  // Bot AI
  moveBots();

  renderer.render(scene,camera);
}
animate();

// ===========================
// WINDOW RESIZE
// ===========================
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
