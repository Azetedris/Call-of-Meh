<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini COD FPS Demo</title>
<style>
  body { margin:0; overflow:hidden; background:#111; }
  canvas { display:block; }
  #crosshair {
    position:absolute; left:50%; top:50%;
    width:10px; height:10px;
    margin-left:-5px; margin-top:-5px;
    border:2px solid yellow; border-radius:50%;
    pointer-events:none;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
<div id="crosshair"></div>
<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.y = 1.6;

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lighting
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(1,2,3);
scene.add(light);

// Ground
const groundGeo = new THREE.PlaneGeometry(100,100);
const groundMat = new THREE.MeshPhongMaterial({color:0x444444});
const ground = new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Controls
const controls = new THREE.PointerLockControls(camera, document.body);
document.body.addEventListener('click', ()=>controls.lock());
scene.add(controls.getObject());

// Player movement
const keys = {};
document.addEventListener('keydown', e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup', e=>keys[e.key.toLowerCase()]=false);
const speed = 0.2;

// Bullets
const bullets = [];
document.addEventListener('click', shootBullet);
function shootBullet(){
  const bulletGeo = new THREE.SphereGeometry(0.05,8,8);
  const bulletMat = new THREE.MeshBasicMaterial({color:0xffff00});
  const bullet = new THREE.Mesh(bulletGeo,bulletMat);
  bullet.position.copy(camera.position);
  bullet.direction = new THREE.Vector3();
  camera.getWorldDirection(bullet.direction);
  bullet.speed = 1;
  scene.add(bullet);
  bullets.push(bullet);
}

// Bot system
const enemies = [];
function spawnBot(){
  const botGeo = new THREE.BoxGeometry(0.5,1,0.5);
  const botMat = new THREE.MeshPhongMaterial({color:0xff0000});
  const bot = new THREE.Mesh(botGeo, botMat);
  bot.position.set(Math.random()*20-10,0.5,Math.random()*-20);
  scene.add(bot);
  enemies.push(bot);
}

// Initial bots
for(let i=0;i<5;i++) spawnBot();

// Animate loop
function animate(){
  requestAnimationFrame(animate);

  // Player movement
  if(keys['w']) controls.moveForward(speed);
  if(keys['s']) controls.moveForward(-speed);
  if(keys['a']) controls.moveRight(-speed);
  if(keys['d']) controls.moveRight(speed);

  // Bullets movement & collision
  bullets.forEach((b,i)=>{
    b.position.add(b.direction.clone().multiplyScalar(b.speed));
    enemies.forEach((e,j)=>{
      if(b.position.distanceTo(e.position)<0.5){
        scene.remove(e);
        enemies.splice(j,1);
        scene.remove(b);
        bullets.splice(i,1);
        spawnBot(); // respawn bot
      }
    });
  });

  // Simple bot AI: move toward player
  enemies.forEach(e=>{
    const dir = new THREE.Vector3();
    dir.subVectors(controls.getObject().position, e.position);
    if(dir.length()>0.1){
      dir.normalize();
      e.position.add(dir.multiplyScalar(0.01));
    }
  });

  renderer.render(scene,camera);
}
animate();

// Window resize
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
