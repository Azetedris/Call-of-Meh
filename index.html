<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini FPS Demo</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#crosshair {
  position:absolute; left:50%; top:50%;
  width:10px; height:10px;
  margin-left:-5px; margin-top:-5px;
  border:2px solid yellow; border-radius:50%;
  pointer-events:none;
}
#info {
  position:absolute; top:10px; left:10px; color:white; z-index:10;
  font-family:sans-serif; font-size:16px;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
<div id="crosshair"></div>
<div id="info">Vurduğun bot: -</div>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);
scene.fog = new THREE.FogExp2(0x222222,0.02);

// Camera & renderer
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(1,2,3);
scene.add(light);

// Ground
const ground = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshPhongMaterial({color:0x555555}));
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Player controls
const controls = new THREE.PointerLockControls(camera,document.body);
document.body.addEventListener('click', ()=>controls.lock());
scene.add(controls.getObject());

// Player speed
const keys = {};
document.addEventListener('keydown', e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup', e=>keys[e.key.toLowerCase()]=false);
const playerSpeed = 0.2;

// Bullets
const bullets = [];
document.addEventListener('click', shootBullet);
function shootBullet(){
  const bullet = new THREE.Mesh(
    new THREE.SphereGeometry(0.1,8,8),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );
  bullet.position.copy(camera.position);
  bullet.direction = new THREE.Vector3();
  camera.getWorldDirection(bullet.direction);
  bullet.speed = 1;
  scene.add(bullet);
  bullets.push(bullet);
}

// Enemies
const enemies = [];
function spawnBot(x,z){
  const bot = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshPhongMaterial({color:0xff0000}));
  bot.position.set(x,0.5,z);
  scene.add(bot);
  enemies.push(bot);
}
spawnBot(5,-5);
spawnBot(-5,-10);
spawnBot(3,-7);

// Animate
const info = document.getElementById('info');
function animate(){
  requestAnimationFrame(animate);

  // Player movement
  if(keys['w']) controls.moveForward(playerSpeed);
  if(keys['s']) controls.moveForward(-playerSpeed);
  if(keys['a']) controls.moveRight(-playerSpeed);
  if(keys['d']) controls.moveRight(playerSpeed);

  // Bullets update & collision
  bullets.forEach((b,i)=>{
    b.position.add(b.direction.clone().multiplyScalar(b.speed));
    enemies.forEach((e,j)=>{
      if(b.position.distanceTo(e.position)<0.7){
        scene.remove(e);
        enemies.splice(j,1);
        bullets.splice(i,1);
        info.innerText = "Vurduğun bot: #" + (j+1);
      }
    });
  });

  // Simple bot AI
  enemies.forEach(e=>{
    const dir = new THREE.Vector3();
    dir.subVectors(controls.getObject().position,e.position);
    if(dir.length()>0.1){
      dir.normalize();
      e.position.add(dir.multiplyScalar(0.02));
    }
  });

  renderer.render(scene,camera);
}
animate();

// Resize
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
